name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: macos-latest
    strategy:
      matrix:
        node: [18, 20]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      # Nothing in the test suite imports Electron (it guards require('electron')),
      # so the tests run headless with no display. Use `npm ci` for a clean,
      # lockfile-pinned install.
      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run tests with coverage
        run: npm run test:coverage

  selftest:
    name: Renderer self-test (E2E)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      # Drives the real renderer against a fake backend (no network/uploads).
      # macOS runners can render Electron offscreen, so no xvfb is needed.
      - name: Headless self-test
        run: npm run selftest
