<?xml version="1.0" encoding="UTF-8"?>
<!--
  IA Desktop app icon — master vector (1024×1024).

  Apple/Windows icon compliance:
    * Smooth 8-bit anti-aliased edges (the old PNG had 1-bit binary alpha,
      which aliased the rounded corners into a harsh dark "boundary").
    * Continuous-corner rounded rect (squircle) at Apple's ~22.37% radius,
      with a small transparent margin so it reads as a proper macOS tile.
    * No black border/stroke — the shape is the gradient fill on transparency.
-->
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5B7CFA"/>
      <stop offset="1" stop-color="#8A6CF6"/>
    </linearGradient>
  </defs>

  <!--
    Rounded "squircle" tile. Canvas 1024; ~9% transparent margin → tile is
    884×884 inset at 70,70. Corner radius 198 ≈ 22.4% of the tile edge,
    matching Apple's continuous-corner proportion.
  -->
  <rect x="70" y="70" width="884" height="884" rx="198" ry="198" fill="url(#iaGrad)"/>

  <!--
    "IA" wordmark, centered. Drawn as paths so it renders identically without a
    font dependency. White, full opacity.
  -->
  <g fill="#FFFFFF">
    <!-- I -->
    <rect x="318" y="300" width="86" height="424"/>
    <!-- A (filled triangle with a counter) -->
    <path d="M 560 300 L 632 300 L 760 724 L 672 724 L 648 638 L 544 638 L 520 724 L 432 724 Z
             M 596 408 L 566 562 L 626 562 Z"/>
  </g>
</svg>
